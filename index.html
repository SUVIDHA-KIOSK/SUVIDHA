<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User-Defined Objects</title>
</head>
<body>
    <h2>User-Defined Objects</h2>
    <p>Open Developer Tools (F12) to see the console outputs.</p>
    <script>
        // Constructor Function
        function Student(name, rollNo, gpa) {
            this.name = name;
            this.rollNo = rollNo;
            this.gpa = gpa;
            
            // Methods
            this.getInfo = function() {
                return this.name + " (Roll: " + this.rollNo + 
                       ", GPA: " + this.gpa + ")";
            };
            
            this.isTopper = function() {
                return this.gpa >= 3.5 ? "Yes" : "No";
            };
        }
 
        // Creating objects
        let student1 = new Student("Ravi", 101, 3.8);
        let student2 = new Student("Priya", 102, 3.2);
 
        console.log("Student 1: " + student1.getInfo());
        console.log("Is Topper? " + student1.isTopper());
 
        // Object with Getters and Setters
        function Person(firstName, lastName) {
            let _fullName = firstName + " " + lastName;
            
            // Getter
            this.getFullName = function() {
                return _fullName;
            };
            
            // Setter
            this.setFullName = function(fName, lName) {
                _fullName = fName + " " + lName;
            };
        }
 
        let person = new Person("John", "Doe");
        console.log("Name: " + person.getFullName());
        person.setFullName("Jane", "Smith");
        console.log("After update: " + person.getFullName());
 
        // Object Literal
        let car = {
            brand: "Toyota",
            model: "Camry",
            year: 2023,
            
            getDetails: function() {
                return this.year + " " + this.brand;
            }
        };
 
        console.log("Car: " + car.getDetails());
 
        // Array of Objects
        let employees = [
            { id: 1, name: "Alice", salary: 50000 },
            { id: 2, name: "Bob", salary: 60000 }
        ];
 
        for (let emp of employees) {
            console.log(emp.name + ": " + emp.salary);
        }
    </script>
</body>
</html>
