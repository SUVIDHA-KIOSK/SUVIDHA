<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iterating Data</title>
</head>
<body>
    <h2>Data Iteration (Check Console)</h2>
    <script>
        {
            // FOR-IN Loop
            console.log("--- FOR-IN Loop ---");
            let fruits = ["Apple", "Banana", "Orange"];
 
            // For-in gets indices for arrays
            for (let index in fruits) {
                console.log(index + ": " + fruits[index]);
            }
 
            // For-in gets property names for objects
            let car = { brand: "Toyota", model: "Camry", year: 2023 };
            for (let prop in car) {
                console.log(prop + ": " + car[prop]);
            }
        }
 
        {
            // FOR-OF Loop
            console.log("--- FOR-OF Loop ---");
            let fruits = ["Apple", "Banana", "Orange"];
 
            // For-of gets values directly
            for (let fruit of fruits) {
                console.log(fruit);
            }
 
            // For-of with Object.keys()
            let car = { brand: "Toyota", model: "Camry" };
            for (let key of Object.keys(car)) {
                console.log(key + ": " + car[key]);
            }
        }
 
        {
            // forEach() Loop
            console.log("--- forEach Loop ---");
            let numbers = [10, 20, 30, 40, 50];
 
            // forEach with value
            numbers.forEach(function(num) {
                console.log(num);
            });
 
            // Using arrow function
            numbers.forEach(num => console.log(num));
 
            // forEach with value and index
            numbers.forEach((num, index) => {
                console.log("Index " + index + ": " + num);
            });
 
            // forEach with objects
            let car = { brand: "Toyota", model: "Camry" };
            Object.entries(car).forEach(([k, v]) => 
                console.log(k + ": " + v)
            );
        }
    </script>
</body>
</html>
